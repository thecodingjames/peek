<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width">

    <script src="vendor/vue-3.5.33.js"></script>
    <script src="vendor/vue-router-5.0.6.js"></script>

    <script src="vendor/vuetify-4.0.6.js"></script>
    <link rel="stylesheet" href="vendor/vuetify-4.0.6.css" />
    <link rel="stylesheet" href="vendor/mdi-5.min.css" />

    <link rel="stylesheet" href="assets/global.css" />

    <script type="module">
      import * as Vest from './vendor/vest-6.3.2.js'

      window.Vest = Vest
      // Make it global to mirror Vue/VueRouter/Vuetify behavior
    </script>
  </head>
  <body>
    <div id="app"></div>

    <script type="module"> 
      import App from './app/app.js'
      import { routes } from './app/routes.js'
      import translate from './app/translate/translate.service.js'

      const app = Vue.createApp(App)
      app.use(Vuetify.createVuetify())
      app.use(VueRouter.createRouter({ 
        history: VueRouter.createMemoryHistory(),
        routes,
      }))

      app.config.globalProperties.isDevelopment = electron.development
      app.config.globalProperties.t = translate

      app.mount('#app')
    </script>
  </body>
</html>
